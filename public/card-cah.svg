<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170" font-family="Georgia,serif">
  <rect width="420" height="170" fill="#0d0d0d"/>

  <!-- Black card -->
  <rect x="20" y="18" width="110" height="134" rx="7" fill="#111" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="32" y="45" font-size="8" fill="#ccc">The secret ingredient in</text>
  <text x="32" y="58" font-size="8" fill="#ccc">my cooking is</text>
  <line x1="32" y1="74" x2="113" y2="74" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <text x="32" y="87" font-size="8" fill="#ccc">and</text>
  <line x1="47" y1="87" x2="113" y2="87" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <rect x="32" y="130" width="38" height="13" rx="6" fill="#fff"/>
  <text x="51" y="140" font-size="7" fill="#000" text-anchor="middle" font-weight="bold">PICK 2</text>

  <!-- White card 1 -->
  <rect x="92" y="30" width="100" height="125" rx="7" fill="#f5f0e8" stroke="#ddd" stroke-width="1.2"/>
  <text x="104" y="56" font-size="8" fill="#111">Uncontrollable</text>
  <text x="104" y="69" font-size="8" fill="#111">sobbing.</text>

  <!-- White card 2 -->
  <rect x="162" y="14" width="100" height="125" rx="7" fill="#eee8dc" stroke="#ccc" stroke-width="1.2"/>
  <text x="174" y="40" font-size="8" fill="#222">A sentient</text>
  <text x="174" y="53" font-size="8" fill="#222">printer error.</text>

  <!-- Vote check -->
  <circle cx="225" cy="112" r="11" fill="#39ff14"/>
  <polyline points="219,112 223,116 232,107" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="282" y="50" font-size="13" fill="#555" letter-spacing="1.5">CARDS AGAINST</text>
  <text x="282" y="68" font-size="13" fill="#fff" letter-spacing="1.5">HACKATOA</text>
  <line x1="282" y1="76" x2="402" y2="76" stroke="#333" stroke-width="1"/>

  <!-- Features -->
  <text x="282" y="96" font-size="8.5" fill="#888">Everyone votes — no czar</text>
  <text x="282" y="112" font-size="8.5" fill="#888">Wild &amp; custom cards</text>
  <text x="282" y="128" font-size="8.5" fill="#888">Image card uploads</text>
  <text x="282" y="144" font-size="8.5" fill="#888">Community packs</text>

  <!-- Party badge -->
  <rect x="282" y="152" width="42" height="12" rx="5" fill="#39ff14" opacity="0.15"/>
  <text x="303" y="161" font-size="7" fill="#39ff14" text-anchor="middle">PARTY</text>
</svg>
