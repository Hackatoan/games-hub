<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170" width="420" height="170">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#78350f;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1c1209;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="420" height="170" fill="#1c1209"/>
  <rect width="420" height="170" fill="url(#g1)"/>
  <!-- TTC board centered -->
  <g transform="translate(210,88)">
    <!-- Grid lines -->
    <line x1="-90" y1="28" x2="90" y2="28" stroke="#f472b6" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="-90" y1="-28" x2="90" y2="-28" stroke="#f472b6" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="28" y1="-90" x2="28" y2="90" stroke="#f472b6" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <line x1="-28" y1="-90" x2="-28" y2="90" stroke="#f472b6" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
    <!-- X top-left -->
    <line x1="-80" y1="-80" x2="-38" y2="-38" stroke="#f472b6" stroke-width="7" stroke-linecap="round"/>
    <line x1="-38" y1="-80" x2="-80" y2="-38" stroke="#f472b6" stroke-width="7" stroke-linecap="round"/>
    <!-- O top-center -->
    <circle cx="0" cy="-58" r="20" fill="none" stroke="#fbcfe8" stroke-width="7"/>
    <!-- X top-right -->
    <line x1="38" y1="-80" x2="80" y2="-38" stroke="#f472b6" stroke-width="7" stroke-linecap="round"/>
    <line x1="80" y1="-80" x2="38" y2="-38" stroke="#f472b6" stroke-width="7" stroke-linecap="round"/>
    <!-- O mid-left -->
    <circle cx="-58" cy="0" r="20" fill="none" stroke="#fbcfe8" stroke-width="7"/>
    <!-- X center -->
    <line x1="-18" y1="-18" x2="18" y2="18" stroke="#f43f5e" stroke-width="8" stroke-linecap="round"/>
    <line x1="18" y1="-18" x2="-18" y2="18" stroke="#f43f5e" stroke-width="8" stroke-linecap="round"/>
    <!-- O mid-right -->
    <circle cx="58" cy="0" r="20" fill="none" stroke="#fbcfe8" stroke-width="7"/>
    <!-- O bottom-left -->
    <circle cx="-58" cy="58" r="20" fill="none" stroke="#fbcfe8" stroke-width="7"/>
    <!-- X bottom-center -->
    <line x1="-18" y1="38" x2="18" y2="80" stroke="#f472b6" stroke-width="7" stroke-linecap="round"/>
    <line x1="18" y1="38" x2="-18" y2="80" stroke="#f472b6" stroke-width="7" stroke-linecap="round"/>
    <!-- O bottom-right -->
    <circle cx="58" cy="58" r="20" fill="none" stroke="#fbcfe8" stroke-width="7"/>
    <!-- Win line diagonal -->
    <line x1="-80" y1="-80" x2="80" y2="80" stroke="#f43f5e" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
