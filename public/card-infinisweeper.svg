<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170" width="420" height="170">
  <defs>
    <radialGradient id="g1" cx="30%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#7c2d12;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1a0e0b;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="g2" cx="70%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#831843;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#1a0e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="420" height="170" fill="#1a0e0b"/>
  <rect width="420" height="170" fill="url(#g1)"/>
  <rect width="420" height="170" fill="url(#g2)"/>
  <!-- Grid cells -->
  <g fill="#2a1a14" stroke="#5a3a30" stroke-width="1.5">
    <rect x="20" y="20" width="38" height="38" rx="3"/>
    <rect x="63" y="20" width="38" height="38" rx="3"/>
    <rect x="106" y="20" width="38" height="38" rx="3"/>
    <rect x="149" y="20" width="38" height="38" rx="3"/>
    <rect x="20" y="63" width="38" height="38" rx="3"/>
    <rect x="63" y="63" width="38" height="38" rx="3"/>
    <rect x="106" y="63" width="38" height="38" rx="3"/>
    <rect x="149" y="63" width="38" height="38" rx="3"/>
    <rect x="20" y="106" width="38" height="38" rx="3"/>
    <rect x="63" y="106" width="38" height="38" rx="3"/>
  </g>
  <!-- Numbers -->
  <text x="39" y="45" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#3b82f6">1</text>
  <text x="82" y="45" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#3b82f6">2</text>
  <text x="125" y="45" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#22c55e">3</text>
  <!-- Flag cell -->
  <rect x="149" y="20" width="38" height="38" rx="3" fill="#3a1a0a" stroke="#846358" stroke-width="1.5"/>
  <line x1="168" y1="50" x2="168" y2="25" stroke="#f43f5e" stroke-width="2" stroke-linecap="round"/>
  <polygon points="168,25 184,32 168,39" fill="#f43f5e"/>
  <!-- Exploded cell -->
  <rect x="106" y="63" width="38" height="38" rx="3" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="125" cy="82" r="10" fill="#ef4444"/>
  <text x="39" y="88" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f59e0b">4</text>
  <text x="82" y="88" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#f59e0b">5</text>
  <!-- Unrevealed -->
  <rect x="149" y="63" width="38" height="38" rx="3" fill="#3a2a24" stroke="#846358" stroke-width="1.5"/>
  <rect x="20" y="106" width="38" height="38" rx="3" fill="#3a2a24" stroke="#846358" stroke-width="1.5"/>
  <rect x="63" y="106" width="38" height="38" rx="3" fill="#3a2a24" stroke="#846358" stroke-width="1.5"/>
  <!-- Fading ghost cells -->
  <rect x="192" y="20" width="38" height="38" rx="3" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.45"/>
  <rect x="235" y="20" width="38" height="38" rx="3" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.22"/>
  <rect x="192" y="63" width="38" height="38" rx="3" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.45"/>
  <rect x="235" y="63" width="38" height="38" rx="3" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.22"/>
  <!-- Infinity arrow -->
  <text x="270" y="92" font-family="Arial,sans-serif" font-size="30" fill="#846358" opacity="0.7">→∞</text>
  <!-- Title -->
  <text x="380" y="80" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="20" font-weight="900" fill="#fbcfe8">INFINI</text>
  <text x="380" y="104" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="20" font-weight="900" fill="#f43f5e">SWEEPER</text>
  <text x="380" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" letter-spacing="2" fill="#a18072">ENDLESS</text>
</svg>
