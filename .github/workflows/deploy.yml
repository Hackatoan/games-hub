name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy games-hub to Docker host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key root@"$DEPLOY_HOST" '
            set -e
            git config --global --add safe.directory /opt/games/hub 2>/dev/null || true
            git -C /opt/games/hub pull
            docker compose -f /opt/games/docker-compose.yml build games-hub
            docker compose -f /opt/games/docker-compose.yml up -d --no-deps games-hub
          '
